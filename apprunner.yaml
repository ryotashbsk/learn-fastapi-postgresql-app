version: 1.0
runtime: python311
build:
  commands:
    build:
      - pip install -r requirements.txt
run:
  command: uvicorn app:app --host 0.0.0.0 --port 8080
  network:
    port: 8080
    env: PORT
  env:
    # DATABASE_URL は App Runner コンソールで設定、または Secrets Manager / SSM Parameter Store を参照
    # - name: DATABASE_URL
    #   value: arn:aws:secretsmanager:ap-northeast-1:123456789012:secret:sample/postgres-url-AbCdEf
