repos:
  - repo: local
    hooks:
      - id: ruff-format-check
        name: ruff format check
        entry: uv run ruff format --check .
        language: system
        pass_filenames: true
        always_run: true

      - id: ruff-check
        name: ruff check
        entry: uv run ruff check .
        language: system
        pass_filenames: true
        always_run: true

      - id: ty-check
        name: ty check
        entry: uv run ty check
        language: system
        pass_filenames: true
        always_run: true

      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: true
        always_run: true
